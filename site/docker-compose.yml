version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ETHEREUM_RPC_URL=http://hardhat:8545
      - FACT_REGISTRY_ADDRESS=${FACT_REGISTRY_ADDRESS}
    depends_on:
      - hardhat

  hardhat:
    build: ../blockchain
    ports:
      - "8545:8545"
    command: npx hardhat node --hostname 0.0.0.0
