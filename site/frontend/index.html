<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZK Fact Verification Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Anonymous Fact Verification</h1>
        <p>Zero-Knowledge proof system for verifying facts without revealing personal data.</p>

        <div class="panel">
            <h2>Verifier Panel</h2>
            <p>Check if a user has a verified fact on-chain.</p>
            <form id="lookupForm">
                <label>Verifier ID Hash:
                    <input type="text" id="verifierIdHash" placeholder="0x..." required>
                </label>
                <label>Subject Tag:
                    <input type="text" id="subjectTag" placeholder="0x..." required>
                </label>
                <label>Fact Type Hash:
                    <input type="text" id="factTypeHash" placeholder="0x..." required>
                </label>
                <button type="submit">Lookup Fact</button>
            </form>
            <div id="result"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
